design:
  theme: engineeringclassic
  page:
    size: us-letter
    top_margin: 0.25in
    bottom_margin: 0.25in
    left_margin: 0.25in
    right_margin: 0.25in
    show_footer: true
    show_top_note: false
  typography:
    line_spacing: 0.65em
    alignment: justified
    date_and_location_column_alignment: right
    font_family:
      body: Source Sans 3
      name: Source Sans 3
      headline: Source Sans 3
      connections: Source Sans 3
      section_titles: Source Sans 3
    font_size:
      body: 10.5pt
      name: 15pt
      headline: 12pt
      connections: 10pt
      section_titles: 1.4em
  header:
    alignment: center
    space_below_name: 0.3cm
    space_below_headline: 0.5cm
    space_below_connections: 0.7cm
    connections:
      phone_number_format: national
      hyperlink: true
      show_icons: true
      display_urls_instead_of_usernames: false
      separator: ''
      space_between_connections: 0.5cm
  section_titles:
    type: with_partial_line
    line_thickness: 0.7pt
    space_above: 0.6cm
    space_below: 0.5cm
  sections:
    allow_page_break: true
    space_between_regular_entries: 0.9em
    space_between_text_based_entries: 0.3em
    show_time_spans_in:
      - experience
  entries:
    date_and_location_width: 3.15cm
    side_space: 0.1cm
    space_between_columns: 0.1cm
    allow_page_break: false
    short_second_row: true
    summary:
      space_above: 0cm
      space_left: 0cm
    highlights:
      bullet: •
      nested_bullet: ◦
      space_left: 0.15cm
      space_above: 0cm
      space_between_items: 0cm
      space_between_bullet_and_text: 0.5em

